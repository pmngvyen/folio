<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio — Discover Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #F7F5F2;
      --white:       #FFFFFF;
      --border:      #E2DDD7;
      --border-mid:  #D4CEC7;
      --text:        #1C1917;
      --text-mid:    #44403C;
      --text-muted:  #78716C;
      --accent:      #8B6F47;
      --accent-dark: #6D5538;
      --accent-light:#F0E8DC;
      --navy:        #0F1B2D;
      --navy-mid:    #162438;
      --navy-soft:   #1E3350;
      --gold:        #D4A853;
      --shadow:      0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg:   0 12px 48px rgba(0,0,0,0.16);
      --radius:      12px;
      --t:           0.22s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAV ─────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 60px;
      background: rgba(247,245,242,0.94);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      cursor: pointer;
    }
    .nav-logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 4px 6px 6px 4px;
      position: relative;
      flex-shrink: 0;
    }
    .nav-logo-icon::after {
      content: '';
      position: absolute;
      left: 5px; top: 5px; bottom: 5px;
      width: 3px; background: #fff; border-radius: 2px;
    }
    .nav-logo-icon::before {
      content: '';
      position: absolute;
      right: 5px; top: 5px; bottom: 5px;
      width: 12px; background: #fff; border-radius: 1px; opacity: 0.85;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-link {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 50px;
      transition: color var(--t), background var(--t);
    }
    .nav-link:hover { color: var(--text); background: rgba(0,0,0,0.04); }
    .nav-link.active { color: var(--accent); background: var(--accent-light); }
    .nav-cta {
      padding: 7px 18px;
      border-radius: 50px;
      background: var(--accent);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: background var(--t), transform var(--t);
    }
    .nav-cta:hover { background: var(--accent-dark); transform: translateY(-1px); }

    /* ── HERO ─────────────────────────────── */
    .hero {
      background: var(--navy);
      padding: 80px 40px 72px;
      position: relative;
      overflow: visible;
      text-align: center;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(212,168,83,0.12) 0%, transparent 70%);
      pointer-events: none;
      overflow: hidden;
    }
    /* Decorative faint book spines in hero */
    .hero-spines {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 3px;
      align-items: flex-end;
      opacity: 0.06;
      pointer-events: none;
    }
    .hero-spine {
      width: 18px;
      border-radius: 2px 2px 0 0;
      background: #fff;
    }
    .hero-eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 700;
      line-height: 1.12;
      color: #F0E6CE;
      margin-bottom: 16px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero h1 em { font-style: italic; color: var(--gold); }
    .hero-sub {
      font-size: 1rem;
      color: #8FA3B8;
      max-width: 420px;
      margin: 0 auto 40px;
    }
    .hero-search-wrap {
      position: relative;
      max-width: 560px;
      margin: 0 auto;
      z-index: 400;
    }
    .hero-search-wrap input {
      width: 100%;
      padding: 15px 58px 15px 22px;
      border-radius: 50px;
      border: 1.5px solid rgba(212,168,83,0.25);
      background: rgba(255,255,255,0.07);
      color: #F0E6CE;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color var(--t), background var(--t), box-shadow var(--t);
    }
    .hero-search-wrap input::placeholder { color: #8FA3B8; }
    .hero-search-wrap input:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(212,168,83,0.15);
    }
    .hero-search-btn {
      position: absolute;
      right: 7px; top: 50%;
      transform: translateY(-50%);
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--gold);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--navy);
      transition: background var(--t), transform var(--t);
    }
    .hero-search-btn:hover { background: #c49a45; transform: translateY(-50%) scale(1.08); }
    .hero-search-btn svg { width: 17px; height: 17px; }
    .hero-search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 200;
      overflow: hidden;
      max-height: 420px;
      overflow-y: auto;
      display: none;
      animation: dropIn 0.18s ease;
      text-align: left;
    }
    .hero-search-results.open { display: block; }
    @keyframes dropIn {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── SHELVES ─────────────────────────────── */
    .shelves-wrap {
      padding: 64px 0 80px;
    }
    .shelf {
      margin-bottom: 56px;
      scroll-margin-top: 80px;
    }
    .shelf-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 40px;
      margin-bottom: 20px;
    }
    .shelf-head-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .shelf-category-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .shelf-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
    }
    .shelf-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-left: 4px;
    }
    .shelf-see-all {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity var(--t);
      white-space: nowrap;
    }
    .shelf-see-all:hover { opacity: 1; }

    /* The horizontal scroll track — like a real shelf */
    .shelf-track-outer {
      position: relative;
    }
    .shelf-track-outer::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 32px;
      width: 80px;
      background: linear-gradient(to left, var(--bg), transparent);
      pointer-events: none;
      z-index: 2;
    }
    .shelf-track {
      display: flex;
      gap: 14px;
      padding: 6px 0 32px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-padding-left: 40px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      cursor: grab;
    }
    .shelf-track:active { cursor: grabbing; }
    .shelf-track::-webkit-scrollbar { display: none; }
    .shelf-track .book-tile:first-child { margin-left: 40px; }
    .shelf-track .book-tile:last-child  { margin-right: 40px; }
    .shelf-track .book-tile-skeleton:first-child { margin-left: 40px; }
    .shelf-track .book-tile-skeleton:last-child  { margin-right: 40px; }

    /* The shelf rail line */
    .shelf-rail {
      height: 4px;
      background: linear-gradient(to right, var(--border-mid), var(--border), var(--border-mid));
      margin: 0 40px;
      border-radius: 2px;
      position: relative;
      top: -4px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.08);
    }

    /* ── BOOK TILE ─────────────────────────────── */
    .book-tile {
      flex-shrink: 0;
      width: 130px;
      scroll-snap-align: start;
      cursor: pointer;
      position: relative;
      transition: transform var(--t);
    }
    .book-tile:hover { transform: translateY(-8px); }
    .book-tile:hover .book-tile-shadow { opacity: 1; }

    .book-tile-cover {
      width: 130px;
      height: 192px;
      border-radius: 4px 8px 8px 4px;
      overflow: hidden;
      background: #D4CEC7;
      position: relative;
      box-shadow: 3px 4px 14px rgba(0,0,0,0.18), inset -3px 0 6px rgba(0,0,0,0.08);
    }
    .book-tile-cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .book-tile-cover-placeholder {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      gap: 8px;
      text-align: center;
    }
    .book-tile-cover-placeholder .pt {
      font-family: 'Playfair Display', serif;
      font-size: 0.7rem;
      font-weight: 600;
      line-height: 1.3;
      color: rgba(255,255,255,0.9);
    }
    .book-tile-cover-placeholder .pa {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.55);
    }
    /* Spine shadow */
    .book-tile-cover::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: linear-gradient(to right, rgba(0,0,0,0.22), transparent);
      border-radius: 4px 0 0 4px;
    }
    .book-tile-shadow {
      position: absolute;
      bottom: -10px; left: 8px; right: 8px;
      height: 20px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.22) 0%, transparent 70%);
      opacity: 0;
      transition: opacity var(--t);
      pointer-events: none;
    }

    .book-tile-info {
      margin-top: 10px;
    }
    .book-tile-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 2px;
    }
    .book-tile-author {
      font-size: 0.68rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .book-tile-add {
      margin-top: 7px;
      width: 100%;
      padding: 5px 0;
      border-radius: 50px;
      border: 1.5px solid var(--border-mid);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t);
    }
    .book-tile-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .book-tile-add.added { border-color: #7A9E7E; color: #7A9E7E; background: #E8F2EB; }

    /* Skeleton loading */
    .book-tile-skeleton .book-tile-cover {
      background: linear-gradient(90deg, #EEEAE4 25%, #E4E0DA 50%, #EEEAE4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .book-tile-skeleton .book-tile-title {
      height: 10px; width: 90%; background: var(--border); border-radius: 4px;
      background: linear-gradient(90deg, #EEEAE4 25%, #E4E0DA 50%, #EEEAE4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .book-tile-skeleton .book-tile-author {
      height: 8px; width: 60%; background: var(--border); border-radius: 4px; margin-top: 4px;
      background: linear-gradient(90deg, #EEEAE4 25%, #E4E0DA 50%, #EEEAE4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── SEARCH RESULT ITEM (shared) ─────────────────────────────── */
    .result-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: default;
      transition: background var(--t);
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: #F7F5F2; }
    .result-cover-sm {
      width: 38px; height: 54px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--border);
    }
    .result-cover-sm-placeholder {
      width: 38px; height: 54px;
      border-radius: 3px;
      background: #EEEAE4;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--border-mid);
    }
    .result-info { flex: 1; min-width: 0; }
    .result-title-sm {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-author-sm { font-size: 0.75rem; color: var(--text-muted); }
    .result-add-sm {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 50px;
      border: 1.5px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 0.73rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--t);
    }
    .result-add-sm:hover { background: var(--accent); color: #fff; }
    .result-empty { padding: 22px; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
    .result-loading {
      padding: 22px;
      text-align: center;
      color: var(--accent);
      font-size: 0.84rem;
      display: flex; align-items: center; justify-content: center; gap: 9px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(139,111,71,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BOOK DETAIL DRAWER ─────────────────────────────── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(28,25,23,0.5);
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      backdrop-filter: blur(3px);
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 380px;
      background: var(--white);
      box-shadow: -8px 0 40px rgba(0,0,0,0.14);
      z-index: 501;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    .drawer-overlay.open .drawer { transform: translateX(0); }
    .drawer-cover-band {
      height: 200px;
      background: var(--navy);
      position: relative;
      overflow: hidden;
    }
    .drawer-cover-bg {
      position: absolute; inset: -10px;
      filter: blur(24px);
      opacity: 0.45;
      object-fit: cover;
      width: calc(100% + 20px);
      height: calc(100% + 20px);
    }
    .drawer-cover-img {
      position: absolute;
      left: 50%; bottom: -24px;
      transform: translateX(-50%);
      width: 100px; height: 148px;
      object-fit: cover;
      border-radius: 4px 8px 8px 4px;
      box-shadow: 4px 6px 28px rgba(0,0,0,0.4);
    }
    .drawer-cover-placeholder {
      position: absolute;
      left: 50%; bottom: -24px;
      transform: translateX(-50%);
      width: 100px; height: 148px;
      border-radius: 4px 8px 8px 4px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 4px 6px 28px rgba(0,0,0,0.3);
    }
    .drawer-close {
      position: absolute; top: 12px; right: 12px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      transition: background var(--t);
    }
    .drawer-close:hover { background: rgba(255,255,255,0.3); }
    .drawer-body { padding: 40px 24px 32px; }
    .drawer-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .drawer-author {
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .drawer-author strong { color: var(--accent); }
    .drawer-meta {
      display: flex;
      gap: 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .drawer-description {
      font-size: 0.86rem;
      color: var(--text-mid);
      line-height: 1.65;
      margin-bottom: 24px;
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .drawer-section-label {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .drawer-status-picker {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
      margin-bottom: 18px;
    }
    .drawer-status-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-mid);
      background: var(--white);
      transition: all var(--t);
      text-align: left;
    }
    .drawer-status-btn .s-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .drawer-status-btn.reading  .s-dot { background: #8B6F47; }
    .drawer-status-btn.finished .s-dot { background: #4A7C59; }
    .drawer-status-btn.want     .s-dot { background: #3D6494; }
    .drawer-status-btn.dropped  .s-dot { background: #B05252; }
    .drawer-status-btn:hover { border-color: var(--border-mid); background: #F7F5F2; }
    .drawer-status-btn.active.reading  { background: #F0E8DC; border-color: #8B6F47; color: #6D5538; }
    .drawer-status-btn.active.finished { background: #E8F2EB; border-color: #4A7C59; color: #4A7C59; }
    .drawer-status-btn.active.want     { background: #E6EEF8; border-color: #3D6494; color: #3D6494; }
    .drawer-status-btn.active.dropped  { background: #F5E8E8; border-color: #B05252; color: #B05252; }
    .drawer-add-btn {
      width: 100%;
      padding: 13px;
      border-radius: 50px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.87rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--t), transform var(--t), box-shadow var(--t);
    }
    .drawer-add-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(139,111,71,0.3);
    }
    .drawer-add-btn:disabled { opacity: 0.6; cursor: default; transform: none; }
    .drawer-goto {
      display: block;
      margin-top: 12px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .drawer-goto:hover { text-decoration: underline; }

    /* ── TOAST ─────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 900;
      display: flex;
      flex-direction: column;
      gap: 7px;
      align-items: center;
      pointer-events: none;
    }
    .toast {
      padding: 10px 20px;
      border-radius: 50px;
      background: var(--text);
      color: var(--bg);
      font-size: 0.81rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      animation: toastIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    .toast.removing { animation: toastOut 0.22s ease forwards; }
    @keyframes toastIn  { from { opacity:0; transform:translateY(14px) scale(0.92); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes toastOut { to   { opacity:0; transform:translateY(8px) scale(0.92); } }

    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      .hero { padding: 56px 20px 56px; }
      .shelf-head { padding: 0 20px; }
      .shelf-track { padding: 6px 0 28px; }
      .shelf-track .book-tile:first-child,
      .shelf-track .book-tile-skeleton:first-child { margin-left: 20px; }
      .shelf-track .book-tile:last-child,
      .shelf-track .book-tile-skeleton:last-child  { margin-right: 20px; }
      .shelf-rail { margin: 0 20px; }

    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

<!-- TOAST -->

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const SHELF_DEFS = [
  { key: 'bestsellers', label: 'Bestsellers',         desc: 'The books everyone is reading',    color: '#D4A853', queries: ['new york times bestseller fiction', 'sunday times bestseller novel', 'oprah book club pick'] },
  { key: 'critically',  label: 'Critically Acclaimed', desc: 'Award winners across every era',  color: '#8B6F47', queries: ['pulitzer prize fiction winner', 'booker prize winner novel', 'national book award winner', 'hugo award winner', 'womens prize fiction winner', 'nobel literature prize author'] },
  { key: 'nonfiction',  label: 'Non-Fiction',          desc: 'True stories, big ideas',          color: '#4A7C59', queries: ['popular nonfiction bestseller', 'narrative nonfiction book'] },
  { key: 'scifi',       label: 'Science Fiction',      desc: 'Worlds beyond imagination',        color: '#3D6494', queries: ['science fiction novel hugo nebula', 'science fiction classic novel'] },
  { key: 'horror',      label: 'Horror',               desc: 'Books that keep the lights on',    color: '#6B3A3A', queries: ['horror novel Stephen King', 'horror fiction novel classic'] },
  { key: 'romance',     label: 'Romance',              desc: 'Stories of the heart',             color: '#B05252', queries: ['romance novel bestseller', 'historical romance fiction'] },
  { key: 'mystery',     label: 'Mystery & Thriller',   desc: 'Unputdownable page-turners',       color: '#5C4A78', queries: ['thriller mystery bestseller', 'detective fiction novel classic'] },
  { key: 'biography',   label: 'Biography',            desc: 'Lives worth knowing',              color: '#7A9E7E', queries: ['biography bestseller memoir', 'autobiography notable figure'] },
  { key: 'history',     label: 'History',              desc: 'The past that shapes us',          color: '#8B7355', queries: ['popular history bestseller', 'world history narrative book'] },
  { key: 'fantasy',     label: 'Fantasy',              desc: 'Magic, myth, and wonder',          color: '#6B8E9F', queries: ['fantasy novel epic series', 'fantasy classic tolkien magic'] },
];

const STORAGE_KEY = 'folio_library_v2';

// ─── LIBRARY ──────────────────────────────────────────────────────────────────
function getLibrary() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveBook(book, status) {
  const lib = getLibrary();
  const exists = lib.find(b => b.openLibKey === book.openLibKey);
  if (exists) { exists.status = status; }
  else { lib.push({ ...book, status, rating: 0, review: '', addedAt: Date.now() }); }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(lib));
}
function isInLibrary(openLibKey) {
  return getLibrary().some(b => b.openLibKey === openLibKey);
}

// ─── HERO SPINES ─────────────────────────────────────────────────────────────
(function buildHeroSpines() {
  const wrap = document.getElementById('hero-spines');
  const heights = [160,120,180,140,200,110,170,150,190,130,160,120,175,145,195];
  heights.forEach(h => {
    const s = document.createElement('div');
    s.className = 'hero-spine';
    s.style.height = h + 'px';
    wrap.appendChild(s);
  });
})();

// ─── COVER URL ───────────────────────────────────────────────────────────────
function coverUrl(coverId, coverKey, size='M') {
  if (coverId)  return `https://covers.openlibrary.org/b/id/${coverId}-${size}.jpg`;
  if (coverKey) return `https://covers.openlibrary.org/b/olid/${coverKey}-${size}.jpg`;
  return null;
}

// Color per shelf for placeholder backgrounds
const PALETTE = [
  '#2C3E50','#8B4513','#1A5276','#4A235A','#1B4F1B',
  '#7B241C','#1F618D','#7E5109','#145A32','#512E5F'
];

// ─── FETCH SHELF ─────────────────────────────────────────────────────────────
async function fetchShelf(def, seenKeys) {
  // Fetch from all queries in parallel, then merge + dedupe
  const results = await Promise.all(
    def.queries.map(q =>
      fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&fields=key,title,author_name,first_publish_year,cover_i,cover_edition_key&limit=40&sort=rating`)
        .then(r => r.json())
        .then(d => d.docs || [])
        .catch(() => [])
    )
  );

  // Merge all results, dedupe by key within this shelf
  const seen = new Set();
  const merged = [];
  for (const docs of results) {
    for (const w of docs) {
      if (!w.key || seen.has(w.key)) continue;
      seen.add(w.key);
      merged.push(w);
    }
  }

  // Filter out books already shown in a previous shelf
  const fresh = merged.filter(w => !seenKeys.has(w.key));

  // Prefer books with covers; fall back to all if not enough
  const withCovers = fresh.filter(w => w.cover_i);
  const pool = withCovers.length >= 16 ? withCovers : fresh;
  const picked = pool.slice(0, 20);

  // Register these keys as seen
  picked.forEach(w => seenKeys.add(w.key));

  return picked.map(w => ({
    id:         w.key,
    openLibKey: w.key,
    title:      w.title,
    author:     w.author_name?.[0] || 'Unknown',
    coverId:    w.cover_i || null,
    coverKey:   w.cover_edition_key || null,
    year:       w.first_publish_year || null,
  }));
}

// ─── BUILD SKELETON ───────────────────────────────────────────────────────────
function buildSkeleton() {
  const tile = document.createElement('div');
  tile.className = 'book-tile book-tile-skeleton';
  tile.innerHTML = `
    <div class="book-tile-cover"></div>
    <div class="book-tile-info">
      <div class="book-tile-title">&nbsp;</div>
      <div class="book-tile-author">&nbsp;</div>
    </div>
  `;
  return tile;
}

// ─── BUILD BOOK TILE ─────────────────────────────────────────────────────────
function buildTile(book, shelfColor, idx) {
  const tile = document.createElement('div');
  tile.className = 'book-tile';
  const url = coverUrl(book.coverId, book.coverKey, 'M');
  const inLib = isInLibrary(book.openLibKey);
  const bgColor = PALETTE[idx % PALETTE.length];

  tile.innerHTML = `
    <div class="book-tile-cover" style="${!url ? `background:${bgColor}` : ''}">
      ${url
        ? `<img src="${url}" alt="${escHtml(book.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''
      }
      <div class="book-tile-cover-placeholder" style="${url ? 'display:none' : `display:flex;background:${bgColor}`}">
        <span class="pt">${escHtml(book.title)}</span>
        <span class="pa">${escHtml(book.author)}</span>
      </div>
    </div>
    <div class="book-tile-shadow"></div>
    <div class="book-tile-info">
      <div class="book-tile-title">${escHtml(book.title)}</div>
      <div class="book-tile-author">${escHtml(book.author)}</div>
      <button class="book-tile-add ${inLib ? 'added' : ''}" data-key="${escHtml(book.openLibKey)}">
        ${inLib ? 'In library' : '+ Add'}
      </button>
    </div>
  `;

  // Click tile body → open drawer
  tile.querySelector('.book-tile-cover').addEventListener('click', () => openDrawer(book));
  tile.querySelector('.book-tile-title').addEventListener('click', () => openDrawer(book));
  tile.querySelector('.book-tile-author').addEventListener('click', () => openDrawer(book));

  // Add button
  const addBtn = tile.querySelector('.book-tile-add');
  addBtn.addEventListener('click', e => {
    e.stopPropagation();
    if (inLib) { toast('Already in your library'); return; }
    openDrawer(book, true); // open with status picker focused
  });

  return tile;
}

// ─── DRAG SCROLL ─────────────────────────────────────────────────────────────
function enableDragScroll(el) {
  let isDown = false, startX, scrollLeft;
  el.addEventListener('mousedown', e => {
    isDown = true; el.classList.add('active');
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });
  el.addEventListener('mouseleave', () => { isDown = false; });
  el.addEventListener('mouseup', () => { isDown = false; });
  el.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollLeft - (x - startX) * 1.2;
  });
}

// ─── RENDER SHELVES ──────────────────────────────────────────────────────────
// ─── DRAWER ──────────────────────────────────────────────────────────────────
let currentDrawerBook = null;
let drawerStatus = 'want';

function openDrawer(book, focusStatus = false) {
  currentDrawerBook = book;
  drawerStatus = 'want';
  const url  = coverUrl(book.coverId, book.coverKey, 'L');
  const urlM = coverUrl(book.coverId, book.coverKey, 'M');
  const inLib = isInLibrary(book.openLibKey);
  const bgColor = PALETTE[Math.abs(book.title.charCodeAt(0) - 65) % PALETTE.length];

  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-cover-band" style="${!urlM ? `background:${bgColor}` : ''}">
      ${urlM ? `<img class="drawer-cover-bg" src="${urlM}" alt="">` : ''}
      ${url
        ? `<img class="drawer-cover-img" src="${url}" alt="${escHtml(book.title)}">`
        : `<div class="drawer-cover-placeholder" style="background:${bgColor}"></div>`
      }
      <button class="drawer-close" id="drawer-close">✕</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-title">${escHtml(book.title)}</div>
      <div class="drawer-author">by <strong>${escHtml(book.author)}</strong>${book.year ? ` · ${book.year}` : ''}</div>
      <div class="drawer-meta" id="drawer-meta">
        <span id="drawer-pages"></span>
        <span id="drawer-subjects"></span>
      </div>
      <div class="drawer-description" id="drawer-desc">Loading description…</div>

      <div class="drawer-section-label">Add to shelf</div>
      <div class="drawer-status-picker">
        ${[
          { key:'reading',  label:'Currently Reading' },
          { key:'finished', label:'Finished' },
          { key:'want',     label:'Want to Read' },
          { key:'dropped',  label:'Dropped' },
        ].map(s => `
          <button class="drawer-status-btn ${s.key} ${drawerStatus===s.key?'active':''}" data-status="${s.key}">
            <span class="s-dot"></span>${s.label}
          </button>
        `).join('')}
      </div>

      <button class="drawer-add-btn" id="drawer-add-btn">
        ${inLib ? 'Already in library — update shelf' : '+ Add to My Library'}
      </button>
      <a class="drawer-goto" href="library.html">Go to My Library →</a>
    </div>
  `;

  // Status picker
  document.querySelectorAll('.drawer-status-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      drawerStatus = btn.dataset.status;
      document.querySelectorAll('.drawer-status-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Add button
  document.getElementById('drawer-add-btn').addEventListener('click', () => {
    saveBook(currentDrawerBook, drawerStatus);
    const btn = document.getElementById('drawer-add-btn');
    btn.textContent = 'Added!';
    btn.disabled = true;
    toast(`Added to "${drawerStatus}" shelf`);
    // Update any tiles showing this book
    document.querySelectorAll(`.book-tile-add[data-key="${currentDrawerBook.openLibKey}"]`).forEach(b => {
      b.textContent = 'In library';
      b.classList.add('added');
    });
    setTimeout(closeDrawer, 800);
  });

  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  document.getElementById('drawer-overlay').classList.add('open');

  // Fetch description async
  fetchBookDetails(book);

  if (focusStatus) {
    setTimeout(() => {
      document.querySelector('.drawer-status-picker')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 350);
  }
}

async function fetchBookDetails(book) {
  try {
    const workKey = book.openLibKey.replace('/works/', '');
    const r = await fetch(`https://openlibrary.org/works/${workKey}.json`);
    const data = await r.json();
    const descEl = document.getElementById('drawer-desc');
    if (descEl) {
      const desc = typeof data.description === 'string'
        ? data.description
        : data.description?.value || 'No description available.';
      descEl.textContent = desc.replace(/\n\n/g, ' ').slice(0, 600) + (desc.length > 600 ? '…' : '');
    }
    if (data.subjects?.length) {
      const subjEl = document.getElementById('drawer-subjects');
      if (subjEl) subjEl.textContent = data.subjects.slice(0,3).join(', ');
    }
  } catch {
    const descEl = document.getElementById('drawer-desc');
    if (descEl) descEl.textContent = 'No description available.';
  }
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  currentDrawerBook = null;
}
document.getElementById('drawer-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('drawer-overlay')) closeDrawer();
});

// ─── HERO SEARCH ─────────────────────────────────────────────────────────────
let searchTimer = null;
const heroInput   = document.getElementById('hero-search');
const heroResults = document.getElementById('hero-search-results');

heroInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = heroInput.value.trim();
  if (!q) { heroResults.classList.remove('open'); return; }
  // If it looks like a genre, show a quick suggestion before searching books
  const genreMatch = matchGenre(q);
  if (genreMatch) {
    const def = SHELF_DEFS.find(d => d.key === genreMatch);
    heroResults.innerHTML = `
      <div class="result-item" id="genre-jump-result" style="cursor:pointer;background:#F7F5F2">
        <div style="width:38px;height:54px;border-radius:4px;background:${def?.color||'#8B6F47'};display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:1.1rem;">📚</div>
        <div class="result-info">
          <div class="result-title-sm">Browse: ${def?.label || q}</div>
          <div class="result-author-sm">Jump to the ${def?.label || q} shelf</div>
        </div>
        <span style="font-size:0.75rem;font-weight:600;color:var(--accent);white-space:nowrap">→ Go</span>
      </div>
    `;
    heroResults.classList.add('open');
    document.getElementById('genre-jump-result').addEventListener('click', () => {
      heroResults.classList.remove('open');
      heroInput.value = '';
      const track = document.getElementById(`track-${genreMatch}`);
      if (track) {
        scrollToShelf(track.closest('.shelf'));
        const label = track.closest('.shelf').querySelector('.shelf-title');
        label.style.transition = 'color 0.3s';
        label.style.color = '#D4A853';
        setTimeout(() => { label.style.color = ''; }, 1800);
      }
    });
    return;
  }
  heroResults.innerHTML = `<div class="result-loading"><div class="spinner"></div>Searching…</div>`;
  heroResults.classList.add('open');
  searchTimer = setTimeout(() => doHeroSearch(q), 400);
});
document.getElementById('hero-search-btn').addEventListener('click', () => {
  const q = heroInput.value.trim();
  if (q) { clearTimeout(searchTimer); doHeroSearch(q); }
});
heroInput.addEventListener('keydown', e => {
  if (e.key === 'Enter')  { clearTimeout(searchTimer); const q = heroInput.value.trim(); if(q) doHeroSearch(q); }
  if (e.key === 'Escape') heroResults.classList.remove('open');
});
document.addEventListener('click', e => {
  if (!e.target.closest('.hero-search-wrap')) heroResults.classList.remove('open');
});

// Scroll to shelf with nav offset
function scrollToShelf(shelfEl) {
  const navH = document.querySelector('nav')?.offsetHeight || 60;
  const head = shelfEl.querySelector('.shelf-head') || shelfEl;
  const top = head.getBoundingClientRect().top + window.scrollY - navH - 90;
  window.scrollTo({ top, behavior: 'smooth' });
}
// Genre keyword map → shelf key
const GENRE_KEYWORDS = {
  'bestseller': 'bestsellers', 'bestsellers': 'bestsellers', 'popular': 'bestsellers',
  'critically acclaimed': 'critically', 'award': 'critically', 'pulitzer': 'critically', 'booker': 'critically', 'prize': 'critically',
  'nonfiction': 'nonfiction', 'non-fiction': 'nonfiction', 'non fiction': 'nonfiction', 'true story': 'nonfiction',
  'sci-fi': 'scifi', 'scifi': 'scifi', 'science fiction': 'scifi', 'sf': 'scifi', 'speculative': 'scifi',
  'horror': 'horror', 'scary': 'horror', 'spooky': 'horror',
  'romance': 'romance', 'love story': 'romance', 'romantic': 'romance',
  'mystery': 'mystery', 'thriller': 'mystery', 'detective': 'mystery', 'crime': 'mystery',
  'biography': 'biography', 'memoir': 'biography', 'autobiography': 'biography',
  'history': 'history', 'historical': 'history',
  'fantasy': 'fantasy', 'magic': 'fantasy', 'epic fantasy': 'fantasy',
};

function matchGenre(q) {
  const lower = q.toLowerCase().trim();
  for (const [keyword, shelfKey] of Object.entries(GENRE_KEYWORDS)) {
    if (lower === keyword || lower.includes(keyword)) return shelfKey;
  }
  return null;
}

async function doHeroSearch(q) {
  // Check for genre query first
  const genreKey = matchGenre(q);
  if (genreKey) {
    heroResults.classList.remove('open');
    heroInput.value = '';
    const track = document.getElementById(`track-${genreKey}`);
    if (track) {
      const shelf = track.closest('.shelf');
      shelf.scrollIntoView({ behavior: 'smooth', block: 'start' });
      // Briefly highlight the shelf label
      const label = shelf.querySelector('.shelf-title');
      label.style.transition = 'color 0.3s';
      label.style.color = 'var(--gold, #D4A853)';
      setTimeout(() => { label.style.color = ''; }, 1800);
    }
    return;
  }
  try {
    const r = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&limit=10&fields=key,title,author_name,first_publish_year,cover_i,cover_edition_key,edition_key`);
    const data = await r.json();
    const docs = data.docs || [];
    if (!docs.length) {
      heroResults.innerHTML = `<div class="result-empty">No books found — try a different search.</div>`;
      return;
    }
    heroResults.innerHTML = '';
    docs.forEach(doc => {
      const covId  = doc.cover_i;
      const covKey = doc.cover_edition_key || (doc.edition_key?.[0]);
      const src    = covId  ? `https://covers.openlibrary.org/b/id/${covId}-S.jpg`
                   : covKey ? `https://covers.openlibrary.org/b/olid/${covKey}-S.jpg` : null;
      const inLib  = isInLibrary(doc.key);
      const book   = {
        openLibKey: doc.key,
        title:  doc.title || 'Unknown title',
        author: (doc.author_name || ['Unknown']).slice(0,2).join(', '),
        year:   doc.first_publish_year || null,
        coverId: covId || null, coverKey: covKey || null,
      };
      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `
        ${src
          ? `<img class="result-cover-sm" src="${src}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="result-cover-sm-placeholder" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>`
          : `<div class="result-cover-sm-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>`
        }
        <div class="result-info">
          <div class="result-title-sm">${escHtml(doc.title || 'Unknown title')}</div>
          <div class="result-author-sm">${escHtml((doc.author_name||['Unknown']).slice(0,2).join(', '))}</div>
        </div>
        <button class="result-add-sm ${inLib ? 'added' : ''}" data-key="${escHtml(doc.key)}">
          ${inLib ? 'Added' : '+ Add'}
        </button>
      `;
      item.querySelector('.result-cover-sm, .result-cover-sm-placeholder, .result-info')?.addEventListener('click', () => {
        heroResults.classList.remove('open');
        openDrawer(book);
      });
      item.querySelector('.result-add-sm').addEventListener('click', e => {
        e.stopPropagation();
        if (inLib) { toast('Already in your library'); return; }
        heroResults.classList.remove('open');
        openDrawer(book, true);
      });
      heroResults.appendChild(item);
    });
  } catch {
    heroResults.innerHTML = `<div class="result-empty">Couldn't reach the book database.</div>`;
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 240); }, 2400);
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ────────────────────────────────────────────────────────────────────

// Daily shelf cache — refreshes automatically when the date changes
const SHELF_CACHE_KEY = 'folio_shelves_cache';

function getTodayStamp() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function getCachedShelves() {
  try {
    const raw = localStorage.getItem(SHELF_CACHE_KEY);
    if (!raw) return null;
    const { stamp, shelves } = JSON.parse(raw);
    if (stamp !== getTodayStamp()) return null; // stale — different day
    return shelves; // { [shelfKey]: [book, ...] }
  } catch { return null; }
}

function cacheShelves(shelves) {
  try {
    localStorage.setItem(SHELF_CACHE_KEY, JSON.stringify({
      stamp: getTodayStamp(),
      shelves
    }));
  } catch {} // storage full — silently skip
}

async function renderShelves() {
  const wrap = document.getElementById('shelves-wrap');
  wrap.innerHTML = '';

  const cached = getCachedShelves();
  const seenKeys = new Set();

  // Build all shelf frames with skeletons first
  const tracks = [];
  for (const def of SHELF_DEFS) {
    const shelf = document.createElement('div');
    shelf.className = 'shelf';
    shelf.innerHTML = `
      <div class="shelf-head">
        <div class="shelf-head-left">
          <span class="shelf-category-dot" style="background:${def.color}"></span>
          <span class="shelf-title">${def.label}</span>
          <span class="shelf-desc">· ${def.desc}</span>
        </div>
      </div>
      <div class="shelf-track-outer">
        <div class="shelf-track" id="track-${def.key}"></div>
      </div>
      <div class="shelf-rail"></div>
    `;
    wrap.appendChild(shelf);
    const track = shelf.querySelector(`#track-${def.key}`);
    enableDragScroll(track);
    for (let i = 0; i < 10; i++) track.appendChild(buildSkeleton());
    tracks.push({ def, track });
  }

  if (cached) {
    // Use cached data — instant load, no network calls
    for (const { def, track } of tracks) {
      const books = cached[def.key] || [];
      track.innerHTML = '';
      books.forEach(b => seenKeys.add(b.openLibKey));
      if (books.length === 0) {
        track.innerHTML = `<div style="padding:20px 40px;color:var(--text-muted);font-size:0.84rem">No books found for this shelf.</div>`;
      } else {
        books.forEach((book, i) => track.appendChild(buildTile(book, def.color, i)));
      }
    }
    return;
  }

  // No cache or stale — fetch fresh, sequentially for dedup, then cache
  const freshCache = {};
  for (const { def, track } of tracks) {
    try {
      const books = await fetchShelf(def, seenKeys);
      freshCache[def.key] = books;
      track.innerHTML = '';
      if (books.length === 0) {
        track.innerHTML = `<div style="padding:20px 40px;color:var(--text-muted);font-size:0.84rem">No books found for this shelf.</div>`;
      } else {
        books.forEach((book, i) => track.appendChild(buildTile(book, def.color, i)));
      }
    } catch {
      track.innerHTML = `<div style="padding:20px 40px;color:var(--text-muted);font-size:0.84rem">Could not load shelf — check your connection.</div>`;
    }
  }
  cacheShelves(freshCache);
}

renderShelves();
</script>
